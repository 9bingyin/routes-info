name: Download and modify file from url

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  download_file_and_modify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v3
      
    - name: Download files
      run: |
        # 定义下载重试函数
        function download_with_retry() {
          local url=$1
          local output=$2
          local max_attempts=3
          local attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Downloading $output (Attempt $attempt of $max_attempts)"
            if curl --fail --connect-timeout 10 --max-time 30 -s -o "$output" "$url"; then
              return 0
            fi
            attempt=$((attempt + 1))
            sleep 5
          done
          rm -f "$output"
          return 1
        }

        # 开始下载文件
        download_with_retry "https://raw.githubusercontent.com/misakaio/chnroutes2/master/chnroutes.txt" "chnroutes.txt"
        download_with_retry "https://www.cloudflare.com/ips-v4" "cfip4.txt"
        download_with_retry "https://www.cloudflare.com/ips-v6" "cfip6.txt"
        download_with_retry "https://raw.githubusercontent.com/SukkaW/Surge/master/Source/ip/lan.conf" "lan-ip.txt"
        download_with_retry "https://raw.githubusercontent.com/SukkaW/Surge/master/Source/non_ip/lan.conf" "lan-non_ip.txt"
        download_with_retry "https://raw.githubusercontent.com/cokebar/gfwlist2dnsmasq/master/gfwlist2dnsmasq.sh" "gfwlist2dnsmasq.sh"
        download_with_retry "https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt" "gfwlist.txt"
        download_with_retry "https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" "apple.china.conf"
        download_with_retry "https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/accelerated-domains.china.conf" "accelerated-domains.china.conf"
        download_with_retry "https://core.telegram.org/resources/cidr.txt" "telegram-cidr.txt"

        # 检查关键文件
        for file in "chnroutes.txt" "cfip4.txt" "cfip6.txt" "telegram-cidr.txt"; do
          if [ ! -f "$file" ]; then
            echo "Error: Failed to download $file"
            exit 1
          fi
        done

    - name: Modify files
      id: modify
      run: |
        set -e
        
        # ChinaCIDR
        if [ -f chnroutes.txt ]; then
          echo "Processing ChinaCIDR..."
          echo "#" | sed "s/$/ $(date)/" > chinacidr.list
          sed -e '/^#/b' -e 's/^/IP-CIDR,/' -e 's/$/,no-resolve/' chnroutes.txt >> chinacidr.list
        else
          echo "Warning: chnroutes.txt not found"
        fi

        # CloudflareCIDR
        if [ -f cfip4.txt ] || [ -f cfip6.txt ]; then
          echo "Processing CloudflareCIDR..."
          echo "#" | sed "s/$/ $(date)/" > cloudflare.list
          [ -f cfip4.txt ] && sed -e '/^#/b' -e 's/^/IP-CIDR,/' -e 's/$/,no-resolve/' cfip4.txt >> cloudflare.list
          echo >> cloudflare.list
          [ -f cfip6.txt ] && sed -e '/^#/b' -e 's/^/IP-CIDR,/' -e 's/$/,no-resolve/' cfip6.txt >> cloudflare.list
        fi

        # LAN
        if [ -f lan-ip.txt ] || [ -f lan-non_ip.txt ]; then
          echo "Processing LAN..."
          echo "#" | sed "s/$/ $(date)/" > lan.list
          [ -f lan-ip.txt ] && sed -E '/(IP-CIDR|IP-CIDR6),/ s/$/,no-resolve/' lan-ip.txt >> lan.list
          echo >> lan.list
          [ -f lan-non_ip.txt ] && cat lan-non_ip.txt >> lan.list
        fi

        # telegram-cidr
        if [ -f telegram-cidr.txt ]; then
          echo "Processing TelegramCIDR..."
          echo "#" | sed "s/$/ $(date)/" > telegramcidr.list
          sed -e '/^#/d' -e '/^$/d' -e 's/^/IP-CIDR,/' -e 's/$/,no-resolve/' telegram-cidr.txt >> telegramcidr.list
        else
          echo "Warning: telegram-cidr.txt not found"
        fi

        # GFWlist
        if [ -f gfwlist2dnsmasq.sh ] && [ -f gfwlist.txt ]; then
          echo "Processing GFWlist..."
          echo "#" | sed "s/$/ $(date)/" > gfw.list
          bash gfwlist2dnsmasq.sh -o gfwlist.txt
          sed -i 's/server=\//DOMAIN-SUFFIX,/g; s/\/127\.0\.0\.1#5353//g' gfwlist.txt
          cat gfwlist.txt >> gfw.list
        fi

        # ChinaDomain
        echo "Processing ChinaDomain..."
        echo "#" | sed "s/$/ $(date)/" > chinadomain.list
        curl --fail -s https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list | sed '/# MyList/,/#/ {/# MyList/d; /#/!d}; /# CN域名直连/,/#/ {/# CN域名直连/d; /#/!d}; /# China DNS/,/#/ {/# China DNS/d; /#/!d}' >> chinadomain.list || rm -f chinadomain.list
        
        # AppleDomain
        if [ -f apple.china.conf ]; then
          echo "Processing AppleDomain..."
          echo "#" | sed "s/$/ $(date)/" > apple-cn.txt
          sed -n 's/^server=\/\(.*\)\/114\.114\.114\.114$/\1/p' apple.china.conf >> apple-cn.txt
        fi

        # AcceleratedDomains China
        if [ -f accelerated-domains.china.conf ]; then
          echo "Processing AcceleratedDomains..."
          echo "#" | sed "s/$/ $(date)/" > accelerated-domains.china.txt
          sed -n 's/^server=\/\(.*\)\/114\.114\.114\.114$/\1/p' accelerated-domains.china.conf >> accelerated-domains.china.txt
        fi

        # Abema
        echo "Processing Abema..."
        echo "#" | sed "s/$/ $(date)/" > abema.list
        curl --fail -s "https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/abema" | \
        while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^# || -z "$line" ]] && continue
            [[ "$line" =~ ^include: ]] && continue
            line=${line%% @*}
            line=$(echo "$line" | sed 's/[[:space:]]*#.*//')
            if [[ "$line" =~ ^domain:(.*)$ ]]; then
                echo "DOMAIN-SUFFIX,${BASH_REMATCH[1]}" >> abema.list
            elif [[ "$line" =~ ^full:(.*)$ ]]; then
                echo "DOMAIN,${BASH_REMATCH[1]}" >> abema.list
            elif [[ "$line" =~ ^regexp:(.*)$ ]]; then
                echo "DOMAIN-REGEX,${BASH_REMATCH[1]}" >> abema.list
            elif [[ "$line" =~ ^keyword:(.*)$ ]]; then
                echo "DOMAIN-KEYWORD,${BASH_REMATCH[1]}" >> abema.list
            else
                echo "DOMAIN-SUFFIX,$line" >> abema.list
            fi
        done

        # Bahamut
        echo "Processing Bahamut..."
        echo "#" | sed "s/$/ $(date)/" > bahamut.list
        curl --fail -s "https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/bahamut" | \
        while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^# || -z "$line" ]] && continue
            [[ "$line" =~ ^include: ]] && continue
            line=${line%% @*}
            line=$(echo "$line" | sed 's/[[:space:]]*#.*//')
            if [[ "$line" =~ ^domain:(.*)$ ]]; then
                echo "DOMAIN-SUFFIX,${BASH_REMATCH[1]}" >> bahamut.list
            elif [[ "$line" =~ ^full:(.*)$ ]]; then
                echo "DOMAIN,${BASH_REMATCH[1]}" >> bahamut.list
            elif [[ "$line" =~ ^regexp:(.*)$ ]]; then
                echo "DOMAIN-REGEX,${BASH_REMATCH[1]}" >> bahamut.list
            elif [[ "$line" =~ ^keyword:(.*)$ ]]; then
                echo "DOMAIN-KEYWORD,${BASH_REMATCH[1]}" >> bahamut.list
            else
                echo "DOMAIN-SUFFIX,$line" >> bahamut.list
            fi
        done

    - name: Organize files
      if: success()
      run: |
        mkdir -p lists
        for file in *.list *.txt; do
          if [ -f "$file" ]; then
            mv -v "$file" lists/ || echo "Failed to move $file"
          fi
        done
        
        # 清理临时文件
        find . -type f -name "*.tmp" -delete
        rm -f chnroutes.txt cfip4.txt cfip6.txt lan-ip.txt lan-non_ip.txt gfwlist2dnsmasq.sh gfwlist.txt apple.china.conf accelerated-domains.china.conf telegram-cidr.txt

    - name: Commit changes
      if: success()
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        if [[ -n "$(git status --porcelain)" ]]; then
          git add -A
          git commit -m "Auto Update $(date '+%Y-%m-%d %H:%M:%S')"
          git push || (git pull --rebase && git push)
        else
          echo "No changes to commit"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Error notification
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Workflow failed',
            body: `Workflow failed on ${new Date().toISOString()}`
          })
